site_name: FluxTrader
site_description: Modulares Trading-Bot-Framework – ORB & OBB Strategien
site_author: André Kesselschläger
docs_dir: docs
repo_name: FluxTrader

theme:
  name: material
  language: de
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: de

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - def_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Architektur: architecture.md
  - Konfiguration: config.md
  - Strategien:
      - Übersicht: strategies/index.md
      - ORB – Opening Range Breakout: strategies/orb.md
      - OBB – One Bar Breakout: strategies/obb.md
  - Broker:
      - Paper (kein Netzwerk): brokers/paper.md
      - Alpaca Markets: brokers/alpaca.md
      - IBKR (Interactive Brokers): brokers/ibkr.md
  - Backtest: backtest.md
  - Live-Betrieb: live.md

extra:
  social:
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/fluxtrader
