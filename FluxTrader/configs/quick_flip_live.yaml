# Quick Flip Scalper – Live (IBKR + IBKRDataProvider)
# OR-Eröffnungskerze = Manipulationskerze; Direction aus or_color; STOP-Order-Entry
mode: live

strategy:
  name: quick_flip
  symbols:
    - NVDA
    - AMD
    - QQQ
  risk_pct: 0.005               # 0.5 % Equity-Risiko je Trade (R-basiertes Sizing)
  params:
    # --- Opening Range & Trade-Fenster ---
    opening_range_minutes: 15       # Länge der Opening-Range-Box in Minuten
    max_trade_window_minutes: 90    # Entry-Fenster nach Open (90 Min = bis 11:00 ET)

    # --- Manipulations-Check (OR-Eröffnungskerze = Liquidity-Kerze) ---
    liquidity_atr_threshold: 0.25   # Min. OR-Range als Anteil der 14-Tage-ATR

    # --- Risk / Reward ---
    min_rr_ratio: 1.5               # Mindest-R:R; darunter wird Trade übersprungen
    buffer_ticks: 0.05              # STOP-Puffer in USD jenseits des Pattern-Extremums
    risk_per_trade: 0.005           # 0.5 % Equity-Risiko je Trade (R-basiertes Sizing)
    min_signal_strength: 0.35       # Mindeststärke 0–1; schwächere Signale verworfen

    # --- Richtungs-Steuerung ---
    allow_shorts: true              # Short-Trades erlauben
    use_extended_target: false      # Erweitertes Ziel (gegenüb. OR-Seite) deaktiviert
    extended_target_min_rr: 2.5     # R:R-Mindestanforderung für erweitertes Ziel

    # --- Trend / Gap ---
    use_trend_filter: true          # SPY-EMA-Trendfilter aktivieren
    trend_ema_period: 20            # EMA-Periode für SPY-Trendfilter
    use_gap_filter: true            # Gap-Filter bei Marktöffnung aktivieren
    max_gap_pct: 0.03               # Max. Gap zur Vortagsclose in Prozent (3 %)

    # --- VIX-Regime ---
    use_vix_filter: true            # VIX-Regime-Filter aktivieren
    vix_high_threshold: 30.0        # Ab diesem VIX-Wert Positionsgröße halbieren
    vix_size_factor: 0.5            # Größen-Multiplikator bei hohem VIX (0.5 = halbe Größe)

    # --- MIT Independence Overlay (Cross-Symbol-Klumpenschutz) ---
    use_mit_overlay: true           # MIT-Independence-Overlay aktivieren
    mit_correlation_groups:
      index_etfs: [SPY, QQQ, IWM, DIA]
      semi_ai: [NVDA, AMD, AVGO]
      mega_cap_tech: [AAPL, MSFT, META, AMZN, GOOGL]

    # --- Candlestick-Pattern-Parameter ---
    hammer_shadow_ratio: 2.0        # Min. unterer Schatten als Vielfaches des Body (Hammer)
    hammer_upper_shadow_ratio: 0.3  # Max. oberer Schatten als Anteil der candle_range
    engulfing_min_body_ratio: 0.6   # Min. Engulfing-Body relativ zum Vorgänger-Body

    # --- Warmup / Buffer ---
    min_bars: 20                    # Warmup-Bars vor erstem Signal
    max_bars_buffer: 2000           # Max. Bar-Anzahl im Strategy-Buffer

broker:
  type: ibkr
  paper: true                  # Paper-Modus; auf false setzen für echtes Kapital
  ibkr_client_id: 22           # Quick-Flip-Bot-ID (Flux_QUICKFLIP); nicht ändern → Error 326
  ibkr_bot_id: Flux_QUICKFLIP  # orderRef-Prefix zur Fills-Isolation

data:
  provider: ibkr               # IBKR-Datenprovider für 5m-Intraday-Bars
  asset_class: equity          # Equity-Modus; futures-Support geplant für v2
  timeframe: "5Min"            # 5-Min-Bars; OR-Box benötigt mindestens 3 Bars (15 Min / 5)
  lookback_days: 59            # Ausreichend für Daily-ATR(14) + Warmup-Bars

notifications:
  enabled: true                # Telegram-Benachrichtigungen aktiv
  bot_name: FLUX_QUICKFLIP     # Prefix für alle ausgehenden Alerts

monitoring:
  watchdog_interval_s: 15          # Heartbeat-Takt des LiveRunners in die DB (Sekunden)
  bar_timeframe_seconds: 300       # 5Min = 300s; explizit gesetzt für Stale-Alert-Kalibrierung
  provider_poll_interval_s: 30     # Polling-Intervall des Datenproviders in Sekunden
  stale_tolerance_s: 60            # Toleranz oberhalb der erwarteten Bar-Zeit
  grace_period_s: 90               # Anlaufpuffer nach Session-Start, bevor Alerts feuern
  reminder_interval_min: 30        # Erinnerung für aktive Health-Alerts alle N Minuten
  trade_window_phases:
    premarket_alert: false         # Kein Alert vor Marktöffnung
    after_cutoff_alert: false      # Kein Alert nach Entry-Cutoff (90-Min-Fenster)
    after_eod_alert: false         # Kein Alert nach EOD-Close

anomaly:
  duplicate_window_minutes: 5      # Duplicate-Guard; Quick-Flip emittiert max. 1 Signal/Tag/Symbol
  duplicate_hard_block: true       # Hart blockieren: Incident-Schutz

execution:
  order_confirm_timeout_s: 10.0              # Timeout für IBKR orderStatus-Bestätigung
  close_verification_timeout_s: 120.0        # Orphan-Close-Timeout
  reconcile_require_healthy_session: true    # Fantasie-Close nur bei gesunder Session
  scanner_provider: auto                     # auto | alpaca | ibkr | yfinance

alerts:
  routing:
    channel_default: ["trade_opened", "trade_closed", "daily_summary"]
    channel_health: ["process_dead", "data_stale", "circuit_break"]
    channel_readiness: []
  dedup_window_s: 300              # Unterdrückt identische Alert-Texte innerhalb dieses Fensters
