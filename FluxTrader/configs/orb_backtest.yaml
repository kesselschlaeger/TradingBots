# ORB Backtest
mode: backtest

strategy:
  name: orb
  #symbols: [SPY, QQQ, AAPL, MSFT, NVDA, AMD, TSLA, META, AMZN, GOOGL]
  symbols: ["SPY", "QQQ", "IWM", "DIA",           # ETFs – stabiler Kern
        "NVDA", "TSLA", "AMD", "AVGO",        # High-Vol AI/Chips (2026 besonders stark)
        "AAPL", "MSFT", "META", "AMZN",       # Big-Tech Klassiker
        "PLTR", "GOOGL", "NFLX",]              # Volatile Growth-Namen
  risk_pct: 0.01
  params:
    opening_range_minutes: 15
    orb_breakout_multiplier: 1.15
    volume_multiplier: 1.7
    min_signal_strength: 0.25

    stop_loss_r: 1.0
    profit_target_r: 2.0
    trail_after_r: 1.0
    trail_distance_r: 0.6

    allow_shorts: true
    avoid_fridays: false

    market_open: "09:30"
    market_close: "16:00"
    orb_end_time: "10:00"
    eod_close_time: "15:27"

    use_trend_filter: true
    trend_ema_period: 20
    use_gap_filter: true
    max_gap_pct: 0.03
    volume_lookback_days: 10

    use_time_decay_filter: true
    time_decay_brackets: [[30, 1.0], [90, 0.85], [180, 0.65]]
    time_decay_late_factor: 0.40

    use_mit_probabilistic_overlay: true
    mit_ev_threshold_r: 0.30
    mit_kelly_fraction: 0.50
    mit_min_strength: 0.25
    mit_calibration_offset: 0.0317
    use_dynamic_kelly_dd_scaling: true
    dynamic_kelly_max_dd: 0.15
    use_mit_independence_guard: true
    mit_correlation_groups:
      index_etfs: [SPY, QQQ, IWM, DIA]
      semi_ai: [NVDA, AMD, AVGO]
      mega_cap_tech: [AAPL, MSFT, META, AMZN, GOOGL]
      high_beta_growth: [TSLA, PLTR, NFLX]

    use_vix_term_structure: true
    vix_regime_flat_lower: 0.90
    vix_regime_flat_upper: 1.00
    vix_regime_backwd_upper: 1.15

broker:
  type: paper
  paper: true

data:
  provider: alpaca
  timeframe: "5Min"
  lookback_days: 470

##backtest:
log_order_events: true
initial_capital: 10000.0

# Walk-Forward-Optimierung (nur für `python main.py wfo ...` genutzt)
wfo:
  is_days: 120
  oos_days: 30
  step_days: 20
  metric: sharpe
  min_trades_is: 20
  n_workers: 0          # 0 = auto (CPU-1), 1 = sequential
  param_grid:
    profit_target_r:     [1.5, 2.0, 3.0]
    stop_loss_r:         [0.75, 1.0, 1.25]
    volume_multiplier:   [1.0, 1.3, 1.5]
    min_signal_strength: [0.15, 0.20, 0.30]
