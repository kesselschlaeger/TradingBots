# ──────────────────────────────────────────────────────
# FluxTrader – Shared Base Config
# Wird von allen spezifischen Configs gemerged.
# Spezifische Config überschreibt diese Werte.
# ──────────────────────────────────────────────────────

initial_capital: 30000.0
currency: USD
benchmark: SPY

broker:
  type: paper
  paper: true
  alpaca_data_feed: iex           # iex = 15-Min-delayed; sip = Real-Time (kostenpflichtig)
  ibkr_host: ""                   # leer = aus IBKR_HOST .env oder 127.0.0.1; IP/Hostname des TWS/Gateway
  ibkr_port: 4002                 # 4001 = Live, 4002 = Paper, 7496/7497 für TWS-Direktverbindung
  ibkr_client_id: 1               # BITTE in jeder Bot-Config überschreiben; Kollision → Error 326
  ibkr_bot_id: FLUX               # BITTE überschreiben; Default kollidiert bei Mehrfach-Bots

data:
  provider: ibkr
  timeframe: "5Min"
  lookback_days: 5

notifications:
  enabled: false

persistence:
  data_dir: /data      # Docker-Volume; lokal via FT_DATA_DIR in .env überschreiben
  state_db: fluxtrader.db

monitoring:
  watchdog_interval_s: 15          # Heartbeat-Takt des LiveRunners in die DB
  bar_timeframe_seconds: 300       # Erwartetes Bar-Intervall in Sekunden (5Min=300)
  provider_poll_interval_s: 30     # Polling-Intervall des Datenproviders in Sekunden
  stale_tolerance_s: 60            # Zusätzliche Toleranz oberhalb der erwarteten Bar-Zeit
  grace_period_s: 90               # Anlaufpuffer nach Session-Start, bevor Alerts feuern
  reminder_interval_min: 30        # Erinnerung für aktive Health-Alerts alle N Minuten
  trade_window_phases:
    premarket_alert: false         # Kein Alert vor Marktöffnung
    after_cutoff_alert: false      # Kein Alert nach Entry-Cutoff
    after_eod_alert: false         # Kein Alert nach EOD-Close

anomaly:
  duplicate_hard_block: true      # Live-Default: identisches Signal im Fenster wird hart blockiert

execution:
  allow_scale_in: false           # False = kein zweiter Entry in bereits offene Position (kein Pyramiding)

alerts:
  routing:
    channel_default: ["trade_opened", "trade_closed", "daily_summary"]   # Standardkanal für Trade-Events
    channel_health: ["process_dead", "data_stale", "circuit_break"]       # Health-Kanal nur für kritische Health-Events
    channel_readiness: []                                               # Leer = Readiness-Kanal deaktiviert
  dedup_window_s: 300              # Unterdrückt identische Alert-Texte innerhalb dieses Fensters
