# OBB Live – One Bar Breakout (Daily Bars)
mode: live

strategy:
  name: obb
  symbols: ["SOXL", #winrate 100
        "SMCI", #winrate 83
        "RKLB", #winrate 100
        "TQQQ", ##winrate 96
        "PLTR",
        "INTC",
        "HOOD", #--winrate100
        "MSTR",
        "SNDK", #--winrate100
        "MU",
        "WBD", #--winrate100
        "AVGO", #--winrate100
        "NFLX",# vorübergehend
        # zweite Reihe
        "AMD", "MU","WBD","COIN","MRNA","UPST","MRVL","CCL","F","VRT","APP","NCLH","VST",]
  risk_pct: 0.015
  params:
    lookback_bars: 50
    allow_shorts: true
    position_size_pct: 0.15
    use_kelly_sizing: false
    max_daily_trades: 1
    max_concurrent_positions: 10

    # Scheduler-Zeiten (OBB hält über Nacht → kein EOD-Flatten, kein Premarket-Scan)
    timeframe: "1Day"
    eod_close_time: null
    premarket_time: null
    market_open_time: "09:15"
    post_market_time: "16:05"
    poll_interval_s: 300

    # OBB-Live-Methodik: Entry kurz vor Close (Auction), Exit nächster Morgen (OPG)
    obb_entry_cutoff_time: "15:59"
    obb_close_time: "16:00"
    obb_exit_open_time: "09:15"
    obb_entry_order_type: "market"
    obb_entry_time_in_force: "cls"
    obb_exit_order_type: "market"
    obb_exit_time_in_force: "opg"
    obb_stop_after_open_exit: true

#broker:
#  type: alpaca
#  paper: true
#  alpaca_data_feed: iex
broker: 
  type: ibkr
  paper: true
  ibkr_client_id: 19
  ibkr_bot_id: Flux_OBB

data:
  provider: ibkr
  timeframe: "1Day"
  lookback_days: 90

notifications:
  enabled: true
  bot_name: Flux_OBB

monitoring:
  watchdog_interval_s: 15          # Heartbeat-Takt des LiveRunners in die DB
  bar_timeframe_seconds: 300       # Erwartetes Bar-Intervall in Sekunden (5Min=300)
  provider_poll_interval_s: 30     # Polling-Intervall des Datenproviders in Sekunden
  stale_tolerance_s: 60            # Zusätzliche Toleranz oberhalb der erwarteten Bar-Zeit
  grace_period_s: 90               # Anlaufpuffer nach Session-Start, bevor Alerts feuern
  reminder_interval_min: 30        # Erinnerung für aktive Health-Alerts alle N Minuten
  trade_window_phases:
    premarket_alert: false         # Kein Alert vor Marktöffnung
    after_cutoff_alert: false      # Kein Alert nach Entry-Cutoff
    after_eod_alert: false         # Kein Alert nach EOD-Close

alerts:
  routing:
    channel_default: ["trade_opened", "trade_closed", "daily_summary"]   # Standardkanal für Trade-Events
    channel_health: ["process_dead", "data_stale", "circuit_break"]       # Health-Kanal nur für kritische Health-Events
    channel_readiness: []                                               # Leer = Readiness-Kanal deaktiviert
  dedup_window_s: 300              # Unterdrückt identische Alert-Texte innerhalb dieses Fensters
