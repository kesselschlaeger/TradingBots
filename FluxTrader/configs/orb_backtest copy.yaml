# ORB Backtest
mode: backtest

strategy:
  name: orb
  #symbols: [SPY, QQQ, AAPL, MSFT, NVDA, AMD, TSLA, META, AMZN, GOOGL]
  symbols: ["SPY", "QQQ", "IWM", "DIA",           # ETFs – stabiler Kern
        "NVDA", "TSLA", "AMD", "AVGO",        # High-Vol AI/Chips (2026 besonders stark)
        "AAPL", "MSFT", "META", "AMZN",       # Big-Tech Klassiker
        "PLTR", "GOOGL", "NFLX",]              # Volatile Growth-Namen
  risk_pct: 0.01
  params:
    opening_range_minutes: 15
    orb_breakout_multiplier: 1.15
    volume_multiplier: 1.7
    allow_shorts: false
    use_mit_probabilistic_overlay: false
    use_trend_filter: true
    use_gap_filter: true
    use_time_decay_filter: true
    use_vix_term_structure: true
    eod_close_time: "15:55"

broker:
  type: paper
  paper: true

data:
  provider: ibkr
  timeframe: "5Min"
  lookback_days: 470

initial_capital: 100000.0

# Walk-Forward-Optimierung (nur für `python main.py wfo ...` genutzt)
wfo:
  is_days: 120
  oos_days: 30
  step_days: 20
  metric: sharpe
  min_trades_is: 20
  n_workers: 0          # 0 = auto (CPU-1), 1 = sequential
  param_grid:
    profit_target_r:     [1.5, 2.0, 3.0]
    stop_loss_r:         [0.75, 1.0, 1.25]
    volume_multiplier:   [1.0, 1.3, 1.5]
    min_signal_strength: [0.15, 0.20, 0.30]

monitoring:
  watchdog_interval_s: 15          # Heartbeat-Takt des LiveRunners in die DB
  bar_timeframe_seconds: 300       # Erwartetes Bar-Intervall in Sekunden (5Min=300)
  provider_poll_interval_s: 30     # Polling-Intervall des Datenproviders in Sekunden
  stale_tolerance_s: 60            # Zusätzliche Toleranz oberhalb der erwarteten Bar-Zeit
  grace_period_s: 90               # Anlaufpuffer nach Session-Start, bevor Alerts feuern
  reminder_interval_min: 30        # Erinnerung für aktive Health-Alerts alle N Minuten
  trade_window_phases:
    premarket_alert: false         # Kein Alert vor Marktöffnung
    after_cutoff_alert: false      # Kein Alert nach Entry-Cutoff
    after_eod_alert: false         # Kein Alert nach EOD-Close

alerts:
  routing:
    channel_default: ["trade_opened", "trade_closed", "daily_summary"]   # Standardkanal für Trade-Events
    channel_health: ["process_dead", "data_stale", "circuit_break"]       # Health-Kanal nur für kritische Health-Events
    channel_readiness: []                                               # Leer = Readiness-Kanal deaktiviert
  dedup_window_s: 300              # Unterdrückt identische Alert-Texte innerhalb dieses Fensters
