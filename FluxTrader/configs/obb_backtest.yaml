# OBB Backtest – One Bar Breakout (Daily Bars)
mode: backtest

strategy:
  name: obb
  #symbols: [SPY, QQQ, IWM, DIA, AAPL, MSFT, NVDA, AMD, TSLA, META, AMZN, GOOGL, NFLX]
  symbols: ["SOXL", #winrate 100
        "SMCI", #winrate 83
        "RKLB", #winrate 100
        "TQQQ", ##winrate 96
        "PLTR",
        "INTC",
        "HOOD", #--winrate100
        "MSTR",
        "SNDK", #--winrate100
        "MU",
        "WBD", #--winrate100
        "AVGO", #--winrate100
        "NFLX",# vorübergehend
        # zweite Reihe
        "AMD", "MU","WBD","COIN","MRNA","UPST","MRVL","CCL","F","VRT","APP","NCLH","VST",]

  risk_pct: 0.01  # Risiko pro Trade in % des Eigenkapitals
  params:
    lookback_bars: 50  # Anzahl historischer Bars für Indikatoren
    allow_shorts: true  # Leerverkäufe erlauben
    position_size_pct: 0.15  # Max. Positionsgröße in % des Eigenkapitals
    use_kelly_sizing: false  # Kelly-Kriterium statt fester % nutzen

broker:
  type: paper  # Broker-Typ: paper, alpaca, ibkr
  paper: true  # Paper/Simulated Trading verwenden

data:
  provider: ibkr  # Datenquelle: ibkr, alpaca, yfinance
  timeframe: "1Day"  # Bar-Timeframe: 1min, 5min, 1hour, 1Day
  lookback_days: 105  # Historisches Lookback-Fenster in Tagen
  ibkr_use_rth: false  # Extended Hours (Pre/After-Market) in IBKR-Daten einbeziehen

initial_capital: 30_000.0  # Startkapital für Backtest

monitoring:
  watchdog_interval_s: 15          # Heartbeat-Takt des LiveRunners in die DB
  bar_timeframe_seconds: 300       # Erwartetes Bar-Intervall in Sekunden (5Min=300)
  provider_poll_interval_s: 30     # Polling-Intervall des Datenproviders in Sekunden
  stale_tolerance_s: 60            # Zusätzliche Toleranz oberhalb der erwarteten Bar-Zeit
  grace_period_s: 90               # Anlaufpuffer nach Session-Start, bevor Alerts feuern
  reminder_interval_min: 30        # Erinnerung für aktive Health-Alerts alle N Minuten
  trade_window_phases:
    premarket_alert: false         # Kein Alert vor Marktöffnung
    after_cutoff_alert: false      # Kein Alert nach Entry-Cutoff
    after_eod_alert: false         # Kein Alert nach EOD-Close

alerts:
  routing:
    channel_default: ["trade_opened", "trade_closed", "daily_summary"]   # Standardkanal für Trade-Events
    channel_health: ["process_dead", "data_stale", "circuit_break"]       # Health-Kanal nur für kritische Health-Events
    channel_readiness: []                                               # Leer = Readiness-Kanal deaktiviert
  dedup_window_s: 300              # Unterdrückt identische Alert-Texte innerhalb dieses Fensters
