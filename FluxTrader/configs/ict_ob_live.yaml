# ICT Order Block MTF Confluence – Live / Paper
mode: live

strategy:
  name: ict_ob_mtf
  #symbols: ["NQ","BTC","ETH"]  # Nasdaq Futures, Bitcoin und Ethereum
  symbols: [NVDA, AMD, AVGO]
  risk_pct: 0.005          # 0.5 % pro Trade
  params:
    min_bars: 250 #800
    max_bars_buffer: 2000

    # OB-Detection
    atr_period: 14
    displacement_mult: 1.2 #1.8 sind viel zu hoch, keine Generierung           # Displacement = body > mult × ATR
    swing_lookback_4h: 3
    swing_lookback_1h: 5

    # Entry
    ob_entry_mode: standard          # aggressive | standard | conservative
    min_confluence_score: 0.75
    min_signal_strength: 0.75

    # Risk
    stop_ob_mult: 0.75              # SL = 0.75 × OB-Range außerhalb der Zone
    profit_target_r: 2.0            # 1:2 RR (alternativ 3.0 für 1:3)
    risk_per_trade: 0.005

    # Filter
    use_trend_filter: true
    trend_ema_period: 20
    use_gap_filter: true
    max_gap_pct: 0.03
    vix_threshold: 30.0

    allow_shorts: true
    entry_cutoff_time: "15:00"   # kein neuer Entry nach 15:00 ET

    # Scheduler-Zeiten
    premarket_time: null         # kein Premarket-Gap-Scan (ICT nutzt keinen Scanner)
    market_open_time: "09:30"    # market-open-Callback (09:30 ET)
    eod_close_time: "15:27"      # Scheduler-Job: alle offenen ICT-Positionen zwangsschließen
    post_market_time: "16:05"    # Scheduler-Job: Tages-Summary via Telegram

    # MIT Independence Guard (optional)
    use_mit_independence_guard: false
    mit_correlation_groups:
      index_etfs: [SPY, QQQ]
      semi_ai: [NVDA, AMD, AVGO]
      mega_cap_tech: [AAPL, MSFT, META, AMZN, GOOGL]
      high_beta_growth: [TSLA, PLTR, NFLX]

broker:
  type: ibkr
  paper: true
  ibkr_client_id: 18             # ICT Equity Bot; eindeutig (Botti=8, ORB=11, OBB=12)
  ibkr_bot_id: Flux_ICT_EQ       # orderRef-Präfix; korrigiert von Flux_BOTTI (Copy-Paste-Bug)

data:
  provider: ibkr
  timeframe: "5Min"
  lookback_days: 60            # 15 Tage für ausreichend 4H-Bars

notifications:
  enabled: true
  bot_name: FLUX_ICT_OB

monitoring:
  watchdog_interval_s: 15          # Heartbeat-Takt des LiveRunners in die DB
  bar_timeframe_seconds: 300       # Erwartetes Bar-Intervall in Sekunden (5Min=300)
  provider_poll_interval_s: 30     # Polling-Intervall des Datenproviders in Sekunden
  stale_tolerance_s: 60            # Zusätzliche Toleranz oberhalb der erwarteten Bar-Zeit
  grace_period_s: 90               # Anlaufpuffer nach Session-Start, bevor Alerts feuern
  reminder_interval_min: 30        # Erinnerung für aktive Health-Alerts alle N Minuten
  trade_window_phases:
    premarket_alert: false         # Kein Alert vor Marktöffnung
    after_cutoff_alert: false      # Kein Alert nach Entry-Cutoff
    after_eod_alert: false         # Kein Alert nach EOD-Close

alerts:
  routing:
    channel_default: ["trade_opened", "trade_closed", "daily_summary"]   # Standardkanal für Trade-Events
    channel_health: ["process_dead", "data_stale", "circuit_break"]       # Health-Kanal nur für kritische Health-Events
    channel_readiness: []                                               # Leer = Readiness-Kanal deaktiviert
  dedup_window_s: 300              # Unterdrückt identische Alert-Texte innerhalb dieses Fensters
