# ICT Order Block MTF Confluence – Live / Paper
mode: live

strategy:
  name: ict_ob_mtf
  #symbols: ["NQ","BTC","ETH"]  # Nasdaq Futures, Bitcoin und Ethereum
  symbols: [NVDA, AMD, AVGO]
  risk_pct: 0.005          # 0.5 % pro Trade
  params:
    min_bars: 250 #800
    max_bars_buffer: 2000

    # OB-Detection
    atr_period: 14
    displacement_mult: 1.8
    swing_lookback_4h: 3
    swing_lookback_1h: 5

    # Entry
    ob_entry_mode: standard          # aggressive | standard | conservative
    min_confluence_score: 0.75
    min_signal_strength: 0.75

    # Risk
    stop_ob_mult: 0.75              # SL = 0.75 × OB-Range außerhalb der Zone
    profit_target_r: 2.0            # 1:2 RR (alternativ 3.0 für 1:3)
    risk_per_trade: 0.005

    # Filter
    use_trend_filter: true
    trend_ema_period: 20
    use_gap_filter: true
    max_gap_pct: 0.03
    vix_threshold: 30.0

    allow_shorts: true
    entry_cutoff_time: "15:00"

    # MIT Independence Guard (optional)
    use_mit_independence_guard: false
    mit_correlation_groups:
      index_etfs: [SPY, QQQ]
      semi_ai: [NVDA, AMD, AVGO]
      mega_cap_tech: [AAPL, MSFT, META, AMZN, GOOGL]
      high_beta_growth: [TSLA, PLTR, NFLX]

broker:
  type: ibkr
  paper: true
  ibkr_client_id: 18
  ibkr_bot_id: Flux_BOTTI

data:
  provider: ibkr
  timeframe: "5Min"
  lookback_days: 60            # 15 Tage für ausreichend 4H-Bars

notifications:
  enabled: true
  bot_name: FLUX_ICT_OB
