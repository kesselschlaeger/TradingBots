# Quick Flip Scalper – Live / Paper
# Reversal-nach-Sweep-Variante der Opening Range.
# Quelle: "The ONE CANDLE Scalping Strategy I Will Use For Life" (ProRealAlgos)
mode: live

strategy:
  name: quick_flip
  symbols: [SPY, QQQ, NVDA]     # liquide Large-Caps mit klarem ORB-Verhalten
  risk_pct: 0.005               # 0.5 % Equity-Risiko je Trade (Signal-Sizing)
  params:
    # --- Opening Range & Trade-Fenster ---
    opening_range_minutes: 15       # Länge der Opening-Range-Box in Minuten
    max_trade_window_minutes: 90    # Maximales Handelsfenster nach Open in Minuten
    entry_cutoff_time: "10:45"      # Kein neuer Trade-Entry nach dieser Uhrzeit ET

    # --- Liquidity Candle (Kern-Filter der Strategie) ---
    liquidity_atr_threshold: 0.25   # Min. Candle-Range als Anteil der 14-Tage-ATR für Liquidity-Signal

    # --- Risk / Reward ---
    min_rr_ratio: 1.5               # Mindest-Risk-Reward-Ratio; Trade wird übersprungen wenn darunter
    buffer_ticks: 0.05              # Stop-Puffer in $ jenseits Reversal-Candle-Extremum
    risk_per_trade: 0.005           # Risiko je Trade als Anteil der Equity (0.5 %)
    min_signal_strength: 0.35       # Mindeststärke des Signals (0–1) für Ausgabe

    # --- Richtungs-Steuerung ---
    allow_shorts: true              # Short-Trades erlauben (false = nur Long)

    # --- Trend / Gap ---
    use_trend_filter: true          # SPY-Trendfilter aktivieren (empfohlen)
    trend_ema_period: 20            # EMA-Periode für SPY-Trendfilter
    use_gap_filter: true            # Gap-Filter bei Marktöffnung aktivieren
    max_gap_pct: 0.03               # Maximaler Gap zur Vortagsclose in % (>3 % = kein Trade)

    # --- VIX-Regime ---
    use_vix_filter: true            # VIX-Regime-Filter aktivieren
    vix_high_threshold: 30.0        # Ab diesem VIX-Wert Position Size reduzieren
    vix_size_factor: 0.5            # Größen-Multiplikator bei hohem VIX (0.5 = halbe Größe)

    # --- MIT Independence Overlay ---
    use_mit_overlay: true           # MIT-Independence-Overlay für Position Sizing aktivieren
    mit_correlation_groups:
      index_etfs: [SPY, QQQ, IWM, DIA]
      semi_ai: [NVDA, AMD, AVGO]
      mega_cap_tech: [AAPL, MSFT, META, AMZN, GOOGL]

    # --- Candlestick-Pattern-Parameter (tunable im Backtest) ---
    hammer_shadow_ratio: 2.0        # Min. unterer Schatten als Vielfaches des Body (Hammer)
    hammer_upper_shadow_ratio: 0.3  # Max. oberer Schatten als Anteil des Body bei Hammer
    engulfing_min_body_ratio: 0.6   # Min. Body-Größe der Engulfing-Candle relativ zum Vorgänger

    # --- Warmup / Buffer ---
    min_bars: 120                   # Minimale Bar-Anzahl im Buffer vor erstem Signal
    max_bars_buffer: 2000           # Max. Bar-Anzahl im Strategy-Buffer

broker:
  type: ibkr
  paper: true
  ibkr_client_id: 22
  ibkr_bot_id: Flux_QUICKFLIP

data:
  provider: ibkr
  timeframe: "5Min"
  lookback_days: 30            # ≥ 25 Kalendertage required (Daily-ATR(14) braucht 14 Handelstage + Feiertags-/DST-Puffer)

notifications:
  enabled: true
  bot_name: FLUX_QUICK_FLIP

monitoring:
  watchdog_interval_s: 15          # Heartbeat-Takt des LiveRunners in die DB
  bar_timeframe_seconds: 300       # Erwartetes Bar-Intervall in Sekunden (5Min=300)
  provider_poll_interval_s: 30     # Polling-Intervall des Datenproviders in Sekunden
  stale_tolerance_s: 60            # Zusätzliche Toleranz oberhalb der erwarteten Bar-Zeit
  grace_period_s: 90               # Anlaufpuffer nach Session-Start, bevor Alerts feuern
  reminder_interval_min: 30        # Erinnerung für aktive Health-Alerts alle N Minuten
  trade_window_phases:
    premarket_alert: false         # Kein Alert vor Marktöffnung
    after_cutoff_alert: false      # Kein Alert nach Entry-Cutoff
    after_eod_alert: false         # Kein Alert nach EOD-Close

alerts:
  routing:
    channel_default: ["trade_opened", "trade_closed", "daily_summary"]   # Standardkanal für Trade-Events
    channel_health: ["process_dead", "data_stale", "circuit_break"]       # Health-Kanal nur für kritische Health-Events
    channel_readiness: []                                               # Leer = Readiness-Kanal deaktiviert
  dedup_window_s: 300              # Unterdrückt identische Alert-Texte innerhalb dieses Fensters
